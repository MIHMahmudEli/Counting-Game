<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counting Game - Master the 21</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="images/fav.svg">
</head>

<body>
    <div class="bg-blur-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-wrapper">
        <header>
            <h1 class="gradient-text">Counting Game</h1>
            <div class="rule-box glass">
                <div class="rule-header">
                    <span class="icon">📜</span>
                    <h2>The Rule</h2>
                </div>
                <p>Count from <b>1</b> to <b>21</b>. The one who lands on <b>21</b> loses the match.</p>
            </div>
        </header>

        <!-- Selection Phase -->
        <section id="start-container" class="glass card">
            <h2>Challenge Accepted?</h2>
            <p>Who takes the first step?</p>
            <div class="button-group">
                <button class="btn btn-secondary">Me</button>
                <button class="btn btn-secondary">Computer</button>
            </div>
        </section>

        <!-- Game Phase -->
        <section id="game-container" class="glass card">
            <div class="turn-status">
                <span id="turn-indicator">Ready?</span>
            </div>

            <div class="count-wrapper">
                <h1 id="count">0</h1>
            </div>

            <div id="buttons" class="move-buttons">
                <button class="move-btn" data-val="1">+1</button>
                <button class="move-btn" data-val="2">+2</button>
                <button class="move-btn" data-val="3">+3</button>
            </div>
        </section>
    </main>

    <!-- Modal for Result -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal-card glass">
            <h2 id="modal-title" class="gradient-text">Game Over</h2>
            <div id="modal-result" class="modal-result"></div>
            <div id="modal-actions">
                <!-- Restart button will be injected here -->
            </div>
        </div>
    </div>

    <footer id="developer-credit">
        <p>Developed by <a href="https://www.facebook.com/share/1AJkxqaNnR/" target="_blank">Mohsin Eli</a></p>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>

</html>
